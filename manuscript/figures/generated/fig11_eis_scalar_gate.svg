<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">EIS scalar diagnostic gate</title>
  <desc id="desc">EIS progresses from QA and scalar endpoints to narrow diagnostic signal, while broad predictive claims remain blocked.</desc>
  <rect width="900" height="420" fill="#fbfbf8"/>
  <text x="40" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1c2b32">EIS scalar diagnostic gate</text>
  <text x="40" y="82" font-family="Arial, sans-serif" font-size="15" fill="#4c5a60">QA-ready modality; scalar endpoint supported for diagnostics; broad predictive claims remain blocked.</text>
  <g font-family="Arial, sans-serif" font-size="16">
    <rect x="42" y="130" width="170" height="92" rx="6" fill="#d9edf2" stroke="#5a9aaa"/>
    <text x="62" y="162" font-weight="700" fill="#17333d">EIS QA</text>
    <text x="62" y="190" fill="#17333d">228 cells</text>
    <text x="62" y="212" fill="#17333d">valid mask passes</text>
    <path d="M214 176 H282" stroke="#61727a" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="284" y="130" width="190" height="92" rx="6" fill="#e3eed4" stroke="#78975a"/>
    <text x="304" y="162" font-weight="700" fill="#243819">RT/50 features</text>
    <text x="304" y="190" fill="#243819">3,983 rows</text>
    <text x="304" y="212" fill="#243819">scalar sidecar</text>
    <path d="M476 176 H544" stroke="#61727a" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="546" y="130" width="190" height="92" rx="6" fill="#efe6c8" stroke="#a68a42"/>
    <text x="566" y="162" font-weight="700" fill="#473717">Endpoint signal</text>
    <text x="566" y="190" fill="#473717">diagnostic support</text>
    <text x="566" y="212" fill="#473717">profile-only prior signal</text>
    <rect x="226" y="282" width="448" height="64" rx="6" fill="#f4dede" stroke="#b96b6b"/>
    <text x="250" y="310" font-weight="700" fill="#5e2222">Blocked</text>
    <text x="330" y="310" fill="#5e2222">DRT, embeddings, broad EIS outcome claims, C-rate/fade claims</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#61727a"/>
    </marker>
  </defs>
</svg>
